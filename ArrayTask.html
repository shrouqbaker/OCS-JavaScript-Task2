        function middleOfArray(array) {
            let mid = array.length / 2;

                return `${array[parseInt(mid)]}`;

        }

        // Question 13
        function sumArray(arr) {
            let sum = 0;
            for (var i = 0; i < arr.length; i++) {
                sum += arr[i];
            }
            return sum;
        }

        var nums = [1, 2, 3, 8, 9];

        function sumArraywhile(arr) {
            let sum = 0;
            let index = 0;
            while (index < arr.length) {

                index++;
            }
            return sum;
        }

        // Question 14
        function minInArray(arr) {
            let min = arr[0];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] < min) min = arr[i];
            }
            return min;
        }
        var nums = [1, 2, 3, 8, 9];
        console.log(minInArray(nums));

        function minInArrayWhile(arr) {
            let min = arr[0];
            let index = 1;
            while (index < arr.length) {
                if (arr[index] < min)
                    min = arr[index];
                index++;
            }
            return min;
        }

        var nums = [1, 2, 3, 8, 9];
        console.log(minInArrayWhile(nums));

                }

            for (let i = 0; i < arr.length; i++) {

            }

        function shorterInArray(arr) {
            let short = arr[0];
            for (let i = 0; i < arr.length; i++) {
                if (arr[i] < short) {
                    short = arr[i];
                }
            }
            return short;
        }
        var strings = ["alex", "mercer", "madrasa", "rashed2", "emad", "hala"];
        console.log(shorterInArray(strings));

        function shorterInArrayWhile(arr) {
            let short = arr[0];
            let index = 1;
            while (index < arr.length) {
                if (arr[index].length < short.length)
                    short = arr[index];
                index++;
            }
            return short;
        }
        var strings = ["alex", "mercer", "madrasa", "rashed2", "emad", "hala"];
        console.log(shorterInArrayWhile(strings))

        // Question 19
        function repeatChar(str, ch) {
            let counter = 0;
            for (let i = 0; i < str.length; i++) {
                if (str[i] == ch) {
                    counter++;
                }
            }
            return counter;
        }
        var string = "alex mercer madrasa rashed2 emad hala";
        console.log(repeatChar(string, "a"));
        console.log(repeatChar(string, "z"));
        function repeatCharwhile(str, ch) {
            let counter = 0;
            let index = 0;
            while (index < str.length) {
                if (str[index] == ch)
                    counter++;
                index++;
            }
            return counter;
        }

        var string = "alex mercer madrasa rashed2 emad hala";
        console.log(repeatCharwhile(string, "a"));
        console.log(repeatCharwhile(string, "z"));
