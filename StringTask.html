        // Question 12
        function count(str, letter) {
            let count = 0;
            for (let i = 0; i < str.length; i++) {
                if (str[i] === letter) {
                    count++;
                }
            }

            return count;
        }
        console.log(count("elephant", "e"));

        // Question 13
        function ispalindrome(str) {
            for (let i = 0; i < str.length / 2; i++) {
                if (str[i] != str[str.length - 1 - i]) {
                    console.log("false");
                    return;
                }
            }
            console.log("true");
        }
        ispalindrome("racecar");

        // Question 14
        function upper(str) {
            let nstr = str.charAt(0).toUpperCase();
            for (let i = 1; i < str.length; i++) {
                if (str[i] == ' ') {
                    nstr += str[i];
                    let c = str[i + 1].toUpperCase();
                    nstr += c;
                    i++;
                }
                else {
                    nstr += str[i];
                }
            }

            return nstr;
        }
        console.log(upper("hello world"));


        // Question 15
        let number = 1234.5678;
        console.log(number.toFixed(2));

        // Question 16
        function ExtractNumber(str) {
            let numbers = [];
            for (let i = 0; i < str.length; i++) {
                if (str[i] >= '0' && str[i] <= '9') {
                    numbers.push(str[i]);
                }
            }
            return numbers;
        }

        console.log(ExtractNumber("There are 3 apples and 2 oranges"));

        }
        Validating("example@email.com");

        console.log("This is a bad word".replace("bad", "good"));

        // Question 19
        function removeDuplicates(str) {
            let newstr = "";
            for (let i = 0; i < str.length; i++) {
                if (newstr.includes(str[i]))
                    continue;
                else
                    newstr += str[i];
            }
            return newstr;
        }
        console.log(removeDuplicates("aabbbcc"));

        // Question 20
        console.log("hello".split("").sort().join(""));

        // Question 21
        function anagrams(str1, str2) {
            return str1.split("").sort().join("") == str2.split("").sort().join("")
        }
        console.log(anagrams("listen", "silent"))

        // Question 22
        console.log("The quick brown fox".split(" ").reverse().join(" "));

        // Question 23
        function longestword(str) {
            let word = str.split(" ");
            let long = word[0];
            for (let i = 1; i < word.length; i++) {
                if (long.length < word[i].length)
                    long = word[i];
            }
            return long
        }

        console.log(longestword("Web development is fascinating"));

        // Question 24
        function PalindromeCheck(str) {
            str = str.toLowerCase().replace(/[^a-z0-9]/g, "");
            for (let i = 0; i < str.length / 2; i++) {
                if (str[i] != str[str.length - 1 - i]) {
                    console.log(false);
                    return;
                }
            }
            console.log(true);

        }
        PalindromeCheck("A man, a plan, a canal, Panama!");


        // Question 25
        function CharacterFrequency(str) {
            let str1 = ""
            let a = {};
            for (let i = 0; i < str.length; i++) {
                if (str1.includes(str[i]))
                    a[str[i]]++;
                else {
                    a[str[i]] = 1;
                    str1 += str[i];
                }
            }
            return a
        }
        console.log(CharacterFrequency("mississippi"));

        // Question26
        function VowelswithNumbers(str) {
            let news = str.replaceAll('a', "1");
            news = news.replaceAll('e', "2");
            news = news.replaceAll('i', "3");
            news = news.replaceAll('o', "4");
            news = news.replaceAll('u', "5");
            return news;
        }
        console.log(VowelswithNumbers("Hello World"))
